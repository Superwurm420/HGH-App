name: Update timetable and generated offline assets

on:
  push:
    # Ziel: nur dann laufen, wenn wirklich eine neue Stundenplan-PDF (oder der Generator) geändert wurde.
    paths:
      - content/timetables/*.pdf
      - scripts/build-timetable-from-pdf.mjs
      - package.json
      - package-lock.json
  workflow_dispatch:

permissions:
  contents: write

jobs:
  rebuild-timetable:
    name: Rebuild timetable after PDF upload
    if: github.event_name != 'push' || github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: --experimental-default-type=module

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: false
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Rebuild generated timetable
        run: npm run generate:timetable

      - name: Commit generated changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if git diff --quiet; then
            echo "No generated file changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/stundenplan.generated.json
          git commit -m "chore: regenerate timetable from uploaded pdf [skip ci]"
          git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "HEAD:${GITHUB_REF_NAME}"
